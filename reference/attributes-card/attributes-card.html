<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attributes Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }

    /* ── Attributes Card ── */
    .info-card {
      position: relative;
      width: 160px;
      user-select: none;
    }

    .card-border-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .card-border-path {
      fill: none;
      stroke: #1a1a1a;
      stroke-width: 1;
    }

    .card-header {
      position: absolute;
      top: 4px;
      left: 0;
      width: 78px;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #1a1a1a;
      white-space: nowrap;
      z-index: 2;
    }

    .card-body {
      position: relative;
      padding-top: 22px;
      display: flex;
      flex-direction: column;
    }

    .card-segment {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 14px;
      gap: 10px;
    }

    .card-segment + .card-segment {
      position: relative;
    }

    .card-segment + .card-segment::before {
      content: '';
      position: absolute;
      top: 0;
      left: 14px;
      right: 14px;
      height: 1px;
      background: #1a1a1a;
    }

    .segment-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .segment-icon svg {
      stroke: #1a1a1a;
      fill: none;
    }

    .segment-label {
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.4;
    }

    .segment-label strong {
      font-weight: 700;
    }

    /* Headphones 3D Y-axis rotation */
    .headphones-icon {
      perspective: 200px;
    }

    .headphones-icon svg {
      animation: spade-spin 4s linear infinite;
      transform-style: preserve-3d;
      fill: #444;
      stroke: none;
    }

    /* Spade 3D Y-axis rotation */
    .spade-icon {
      perspective: 200px;
    }

    .spade-icon svg {
      animation: spade-spin 4s linear infinite;
      transform-style: preserve-3d;
      fill: #444;
    }

    @keyframes spade-spin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    /* macOS cursor 3D rotation */
    .cursor-icon {
      perspective: 200px;
    }

    .cursor-icon svg {
      animation: spade-spin 4s linear infinite;
      transform-style: preserve-3d;
      fill: #444;
      stroke: none;
    }
  </style>
</head>
<body>

  <div class="info-card">
    <!-- SVG notched border outline -->
    <svg class="card-border-svg" viewBox="0 0 160 380" preserveAspectRatio="none">
      <path class="card-border-path" d="
        M 14 26
        Q 1 26 1 39
        L 1 366
        Q 1 379 14 379
        L 146 379
        Q 159 379 159 366
        L 159 14
        Q 159 1 146 1
        L 88 1
        Q 82 1 82 7
        L 82 16
        Q 82 26 72 26
        L 14 26
        Z
      " />
    </svg>
    <div class="card-header">Specs</div>
    <div class="card-body">
      <!-- Segment 1: Music Curator -->
      <div class="card-segment">
        <div class="segment-icon headphones-icon">
          <!-- AirPods Max silhouette -->
          <svg width="50" height="50" viewBox="0 0 50 50" fill="#444" stroke="none">
            <!-- Headband - thick arch -->
            <path d="
              M 9 22 C 9 7, 17 1, 25 1 C 33 1, 41 7, 41 22
              L 38 22 C 38 10, 32 4, 25 4 C 18 4, 12 10, 12 22 Z
            " />
            <!-- Left slider arm -->
            <rect x="8" y="18" width="5" height="10" rx="2" />
            <!-- Right slider arm -->
            <rect x="37" y="18" width="5" height="10" rx="2" />
            <!-- Left ear cup - large oval -->
            <ellipse cx="10.5" cy="35" rx="10" ry="12" />
            <!-- Left cup inner detail -->
            <ellipse cx="10.5" cy="35" rx="7" ry="9" fill="#555" />
            <!-- Left cup highlight edge -->
            <path d="M 5 28 C 3 30, 2.5 33, 3 36" fill="none" stroke="#444" stroke-width="0.8" stroke-linecap="round" />
            <!-- Right ear cup - large oval -->
            <ellipse cx="39.5" cy="35" rx="10" ry="12" />
            <!-- Right cup inner detail -->
            <ellipse cx="39.5" cy="35" rx="7" ry="9" fill="#555" />
            <!-- Right cup highlight edge -->
            <path d="M 45 28 C 47 30, 47.5 33, 47 36" fill="none" stroke="#444" stroke-width="0.8" stroke-linecap="round" />
          </svg>
        </div>
        <div class="segment-label">Electronic<br><strong>Music Curator</strong></div>
      </div>

      <!-- Segment 2: World-Recognized Cardist -->
      <div class="card-segment">
        <div class="segment-icon spade-icon">
          <svg width="36" height="40" viewBox="0 0 36 40" fill="#444" stroke="none">
            <path d="M18 2 C18 2, 2 16, 2 24 C2 29, 6 32, 10 32 C13 32, 15.5 30.5, 17 28 C16 33, 13 36, 10 38 L26 38 C23 36, 20 33, 19 28 C20.5 30.5, 23 32, 26 32 C30 32, 34 29, 34 24 C34 16, 18 2, 18 2Z" />
          </svg>
        </div>
        <div class="segment-label">World-Recognized<br><strong>Cardist</strong></div>
      </div>

      <!-- Segment 3: Award-Winning Product Designer -->
      <div class="card-segment">
        <div class="segment-icon cursor-icon">
          <!-- macOS pointer cursor -->
          <svg width="28" height="36" viewBox="0 0 28 36" fill="#444" stroke="none">
            <path d="M2 1 L2 28 L8 22 L14 34 L18 32 L12 20 L20 20 Z" />
          </svg>
        </div>
        <div class="segment-label">Award-Winning<br><strong>Product Designer</strong></div>
      </div>
    </div>
  </div>

</body>
</html>
